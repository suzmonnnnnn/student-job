<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Profile</title><link rel="stylesheet" th:href="@{/css/style.css}"><meta name="viewport" content="width=device-width, initial-scale=1"></head><body><div th:replace="~{fragments/layout :: navbar}"></div><main class="container"><section class="profile-card"><h1 th:text="${user.username}">Username</h1><p th:text="${user.email}">email</p><span class="tag" th:text="${user.role}">role</span></section><div class="page-head"><h2>My Jobs / Items</h2><a th:href="@{/posts/new}" class="btn">Create Job / Item</a></div><div th:if="${#lists.isEmpty(posts)}" class="empty">You have not created any posts yet.</div><div class="grid"><div th:each="post : ${posts}" class="card"><img th:if="${post.image != null}" th:src="@{'/uploads/' + ${post.image}}"><div class="card-body"><span class="tag" th:text="${post.category}"></span><h3 th:text="${post.title}"></h3><p th:text="${#strings.abbreviate(post.description, 100)}"></p><a th:href="@{'/posts/' + ${post.id}}" class="btn full">Manage</a></div></div></div></main><div th:replace="~{fragments/layout :: footer}"></div></body></html>
