<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Sign Up</title><link rel="stylesheet" th:href="@{/css/style.css}"><meta name="viewport" content="width=device-width, initial-scale=1"></head><body><div th:replace="~{fragments/layout :: navbar}"></div><main class="auth-wrap"><form th:action="@{/signup}" th:object="${signupForm}" method="post" class="auth-card"><h1>Create account</h1><p>Join the student portal community.</p><div th:if="${error}" class="alert error" th:text="${error}"></div><label>Username</label><input th:field="*{username}" required><small th:errors="*{username}"></small><label>Email</label><input th:field="*{email}" type="email" required><small th:errors="*{email}"></small><label>Password</label><input th:field="*{password}" type="password" required><small th:errors="*{password}"></small><button class="btn full" type="submit">Sign Up</button><p>Already have an account? <a th:href="@{/login}">Login</a></p></form></main></body></html>
