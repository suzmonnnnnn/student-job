<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title th:text="${post.title}">Post</title><link rel="stylesheet" th:href="@{/css/style.css}"><meta name="viewport" content="width=device-width, initial-scale=1"></head><body><div th:replace="~{fragments/layout :: navbar}"></div><main class="detail"><article class="detail-card"><img th:if="${post.image != null}" th:src="@{'/uploads/' + ${post.image}}" class="detail-img"><div class="detail-body"><span class="tag" th:text="${post.category}"></span><h1 th:text="${post.title}"></h1><div class="meta"><span th:text="'Location: ' + ${post.location}"></span><span th:text="'By: ' + ${post.createdBy.username}"></span><span th:text="${#temporals.format(post.createdDate,'MMM dd, yyyy HH:mm')}"></span></div><p class="description" th:text="${post.description}"></p><div th:if="${canModify}" class="actions"><a th:href="@{'/posts/' + ${post.id} + '/edit'}" class="btn">Edit</a><form th:action="@{'/posts/' + ${post.id} + '/delete'}" method="post" onsubmit="return confirm('Delete this post?')"><button class="btn danger" type="submit">Delete</button></form></div></div></article></main><div th:replace="~{fragments/layout :: footer}"></div></body></html>
