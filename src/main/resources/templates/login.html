<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Login</title><link rel="stylesheet" th:href="@{/css/style.css}"><meta name="viewport" content="width=device-width, initial-scale=1"></head><body><div th:replace="~{fragments/layout :: navbar}"></div><main class="auth-wrap"><form th:action="@{/login}" method="post" class="auth-card"><h1>Welcome back</h1><p>Login to manage your posts.</p><div th:if="${param.error}" class="alert error">Invalid username or password.</div><div th:if="${param.logout}" class="alert success">You have been logged out.</div><div th:if="${param.registered}" class="alert success">Account created. Please login.</div><label>Username</label><input type="text" name="username" required autofocus><label>Password</label><input type="password" name="password" required><button class="btn full" type="submit">Login</button><p>New here? <a th:href="@{/signup}">Create account</a></p></form></main></body></html>
