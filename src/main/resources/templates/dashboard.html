<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security"><head><title>Dashboard</title><link rel="stylesheet" th:href="@{/css/style.css}"><meta name="viewport" content="width=device-width, initial-scale=1"></head><body><div th:replace="~{fragments/layout :: navbar}"></div><main class="container"><div class="page-head"><div><h1>Dashboard</h1><p th:text="'Logged in as ' + ${user.username}">Logged in</p></div><a th:href="@{/posts/new}" class="btn">Create Job / Item</a></div><div th:if="${success}" class="alert success" th:text="${success}"></div><h2>All Jobs / Items</h2><div th:if="${#lists.isEmpty(posts)}" class="empty">No posts found.</div><div class="grid"><div th:each="post : ${posts}" class="card"><img th:if="${post.image != null}" th:src="@{'/uploads/' + ${post.image}}"><div class="card-body"><span class="tag" th:text="${post.category}"></span><h3 th:text="${post.title}"></h3><p th:text="${#strings.abbreviate(post.description, 110)}"></p><div class="meta"><span th:text="${post.location}"></span><span th:text="${post.createdBy.username}"></span></div><a th:href="@{'/posts/' + ${post.id}}" class="btn full">Open</a></div></div></div></main><div th:replace="~{fragments/layout :: footer}"></div></body></html>
